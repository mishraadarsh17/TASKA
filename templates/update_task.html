{% extends "layout.html" %}

{% block content %}
<a href="{{ request.referrer }}" class="back-link">
    ← Back
</a>
<div class="form-page">

    <div class="form-card">

        <div class="form-header">
            <h1>Update Task</h1>
            <p>Update your task details.</p>
        </div>

        <form action="/task/update/{{ task['id'] }}" method="post">

            <div class="form-group">
                <label>Title</label>

                <input type="text" name="title" value="{{ task['title'] }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>

                <textarea name="description" rows="6">{{ task['description'] }}</textarea>
            </div>

            <div class="row-2">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status">

                        <option value="Pending" {% if task['status']=="Pending" %}selected{% endif %}>
                            Pending
                        </option>

                        <option value="In Progress" {% if task['status']=="In Progress" %}selected{% endif %}>
                            In Progress
                        </option>

                        <option value="On Hold" {% if task['status']=="On Hold" %}selected{% endif %}>
                            On Hold
                        </option>

                        <option value="Completed" {% if task['status']=="Completed" %}selected{% endif %}>
                            Completed
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Priority</label>

                    <select name="priority">

                        <option value="Low" {% if task['priority']=="Low" %}selected{% endif %}>
                            Low
                        </option>

                        <option value="Medium" {% if task['priority']=="Medium" %}selected{% endif %}>
                            Medium
                        </option>

                        <option value="High" {% if task['priority']=="High" %}selected{% endif %}>
                            High
                        </option>

                    </select>

                </div>

            </div>

            {% if task['project_id'] %}

            <div class="form-group">

                <label>Assign Member</label>

                <select name="member_id">

                    <option value="">select</option>
                    {% for member in members %}
                    <option value="{{ member['id'] }}" {% if member['id']==task['assigned_to'] %}selected{% endif %}>
                        {{ member['username'] }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            {% endif %}

            <div class="form-group">

                <label>Due Date</label>

                <input type="date" name="due_date" value="{{ task['due_date'] }}">

            </div>

            <button class="submit-btn" type="submit">
                Update Task
            </button>

        </form>

    </div>
</div>

{% endblock %}
